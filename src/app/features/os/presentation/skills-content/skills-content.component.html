<div class="skills">
  @for (entry of categories; track entry[0]) {
    <div class="skills__category">
      <div class="skills__cat-header">
        <span class="skills__cat-icon">{{ categoryIcons[entry[0]] }}</span>
        <span class="skills__cat-name">{{ entry[0] }}</span>
        <span class="skills__cat-count">{{ entry[1].length }} skills</span>
      </div>

      <div class="skills__list">
        @for (skill of entry[1]; track skill.name) {
          <div class="skill">
            <div class="skill__meta">
              <span class="skill__name">{{ skill.name }}</span>
              <span class="skill__badge" [class]="'skill__badge--' + levelClass(skill.level)">
                {{ levelLabel(skill.level) }}
              </span>
              <span class="skill__pct">{{ skill.level }}<small>%</small></span>
            </div>
            <div class="skill__track">
              <div
                class="skill__fill"
                [class]="'skill__fill--' + levelClass(skill.level)"
                [style.--target]="skill.level + '%'"
              ></div>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>
