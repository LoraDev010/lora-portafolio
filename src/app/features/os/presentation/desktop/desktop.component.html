<div class="desktop" (mousedown)="onDesktopMouseDown($event)">
  @for (item of items(); track item.app.id) {
    <app-desktop-icon [item]="item" (opened)="openApp($event)" (moved)="onIconMoved($event.id, $event.position)" />
  }

  @for (win of windows(); track win.id) {
    @if (!win.isMinimized) {
      <app-window [win]="win">
        @switch (win.appId) {
          @case ('about')      { <app-about-content /> }
          @case ('experience') { <app-experience-content /> }
          @case ('skills')     { <app-skills-content /> }
          @case ('projects')   { <app-projects-content /> }
          @case ('contact')    { <app-contact-content /> }
          @case ('ai')         { <app-ai-assistant /> }
        }
      </app-window>
    }
  }

  @if (selecting()) {
    <div class="selection-box" [ngStyle]="{
      left:   selectionBox().x + 'px',
      top:    selectionBox().y + 'px',
      width:  selectionBox().w + 'px',
      height: selectionBox().h + 'px'
    }"></div>
  }

  <app-taskbar />
</div>
